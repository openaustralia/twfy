name: "Perl checks"
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Perl dependencies
        run: |
          sudo apt-get install -y \
            libdbd-mysql-perl \
            libdbi-perl \
            libsearch-xapian-perl \
            libxml-rss-perl \
            libxml-twig-perl
      - name: Lint
        run: make lint-perl-ci
