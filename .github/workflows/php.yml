name: "PHP checks"
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, sqlite
          coverage: none # Use 'xdebug' or 'pcov' for code coverage
          tools: composer
        env:
          fail-fast: true
      - name: Lint
        run: make lint-ci
        env:
          fail-fast: true
      - name: composer
        run: composer install
        env:
          fail-fast: true
      - name: audit
        run: composer validate
        env:
          fail-fast: true
      - name: phpcs
        run: make phpcs-ci
        env:
          fail-fast: true

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_twfy
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, mysqli
          coverage: none
          tools: composer
        env:
          fail-fast: true
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run tests
        run: make test
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: test_twfy
