name: "PHP checks"
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, sqlite
          coverage: none # Use 'xdebug' or 'pcov' for code coverage
          tools: composer
        env:
          fail-fast: true
      - name: Lint
        run: make lint-ci
        env:
          fail-fast: true
      - name: composer
        run: composer install
        env:
          fail-fast: true
      - name: audit
        run: composer validate
        env:
          fail-fast: true
      - name: phpcs
        run: make phpcs-ci
        env:
          fail-fast: true

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_twfy
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for SonarCloud analysis
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, mysqli
          coverage: xdebug
          tools: composer
        env:
          fail-fast: true
      - name: Install Xapian PHP bindings
        run: |
          sudo apt-get update
          sudo apt-get install -y libxapian-dev zlib1g-dev
          sudo pecl install xapian || true
          # If pecl doesn't have it, build from source
          if ! php -m | grep -q xapian; then
            XAPIAN_VERSION=$(dpkg -s libxapian-dev | grep '^Version:' | awk '{print $2}' | cut -d- -f1)
            wget "https://oligarchy.co.uk/xapian/${XAPIAN_VERSION}/xapian-bindings-${XAPIAN_VERSION}.tar.xz"
            tar xf "xapian-bindings-${XAPIAN_VERSION}.tar.xz"
            cd "xapian-bindings-${XAPIAN_VERSION}"
            ./configure --with-php
            make
            sudo make install
            echo "extension=xapian.so" | sudo tee "$(php -r 'echo ini_get("extension_dir");')/../conf.d/20-xapian.ini"
            cd ..
          fi
          php -r "new XapianStem('english'); echo \"Xapian OK\n\";"
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Load database schema
        run: |
          mysql -h 127.0.0.1 -u root -proot test_twfy < db/schema.sql
      - name: Run tests with coverage
        run: |
          set -o pipefail
          XDEBUG_MODE=coverage ./vendor/bin/phpunit \
            --coverage-text \
            --coverage-clover=coverage/clover.xml \
            --coverage-html=coverage/html \
            --log-junit=coverage/junit.xml | tee phpunit-coverage.out
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: test_twfy
      - name: Build coverage summary
        run: |
          {
            echo "## Code Coverage"
            echo
            echo '```text'
            if grep -q '^Code Coverage Report:' phpunit-coverage.out; then
              sed -n '/^Code Coverage Report:/,$p' phpunit-coverage.out
            else
              echo "Coverage summary not found in phpunit output."
            fi
            echo '```'
          } > code-coverage-results.md
      - name: Add coverage to job summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md
